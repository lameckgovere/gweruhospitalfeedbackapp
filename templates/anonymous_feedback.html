<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Feedback - Gweru District Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 px-6 py-8 text-center">
            <i class="fas fa-comment-dots text-5xl text-white mb-4"></i>
            <h1 class="text-3xl font-bold text-white">Share Your Feedback Anonymously</h1>
            <p class="text-indigo-100 mt-2">Your voice helps us improve – and your identity stays private.</p>
        </div>

        <!-- Form -->
        <div class="p-8">
            <form method="post" enctype="multipart/form-data" class="space-y-5">
                <!-- Feedback Type -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-tag text-indigo-500 mr-1"></i> Feedback Type
                    </label>
                    <select name="type" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        <option value="complaint">Complaint</option>
                        <option value="compliment">Compliment</option>
                        <option value="suggestion">Suggestion</option>
                    </select>
                </div>

                <!-- Your Feedback -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-pen text-indigo-500 mr-1"></i> Your Feedback
                    </label>
                    <textarea name="issue" rows="4" required placeholder="Please describe your experience..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>

                <!-- Recommendation (optional) -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-lightbulb text-indigo-500 mr-1"></i> Recommendation (optional)
                    </label>
                    <textarea name="recommendation" rows="2" placeholder="What would you suggest?" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>

                <!-- Contact fields (optional) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">
                            <i class="fas fa-envelope text-indigo-500 mr-1"></i> Email (optional)
                        </label>
                        <input type="email" name="contact_email" placeholder="If you want a response" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">
                            <i class="fas fa-phone text-indigo-500 mr-1"></i> Phone (optional)
                        </label>
                        <input type="tel" name="contact_phone" placeholder="e.g., 077..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <!-- Attachments -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-paperclip text-indigo-500 mr-1"></i> Attachments (optional, max 16MB)
                    </label>
                    <input type="file" name="attachments" multiple class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>

                <!-- Submit Button -->
                <div class="flex justify-center">
                    <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 transition flex items-center">
                        <i class="fas fa-paper-plane mr-2"></i> Submit Anonymously
                    </button>
                </div>
            </form>

            <!-- Back to Welcome -->
            <div class="mt-6 text-center">
                <a href="/" class="text-indigo-600 hover:text-indigo-800 text-sm">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Welcome Page
                </a>
            </div>

            <p class="text-xs text-gray-500 text-center mt-4">
                <i class="fas fa-shield-alt mr-1"></i> No personal data is stored unless you provide it voluntarily. Your IP address is not logged.
            </p>
        </div>
    </div>
</body>
</html>
