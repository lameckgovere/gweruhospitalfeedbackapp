<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Gweru District Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded shadow text-center max-w-md">
        <h2 class="text-2xl font-bold text-green-600 mb-4">Thank You!</h2>
        <p class="text-gray-700 mb-4">Your feedback has been submitted. Your reference number is:</p>
        <p class="text-xl font-mono bg-gray-100 p-2 rounded mb-4">{{ reference }}</p>
        <p class="text-sm text-gray-600 mb-6">Keep this reference if you want to check the status later.</p>
        <a href="/anonymous" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Submit Another</a>
        <a href="/" class="block mt-4 text-gray-600 hover:underline">Return to Home</a>
    </div>
</body>
</html>
