<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Gweru District Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        <!-- Header with wave effect -->
        <div class="bg-indigo-600 px-6 py-8 text-center relative">
            <h2 class="text-3xl font-bold text-white">Staff Access</h2>
            <p class="text-indigo-100 mt-2">Enter your credentials to manage feedback</p>
        </div>

        <div class="p-8">
            {% if error %}
            <div class="bg-red-50 text-red-700 p-3 rounded-lg mb-4 border border-red-200">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
                </div>
                <button type="submit"
                        class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 transition">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/" class="text-indigo-600 hover:text-indigo-800 text-sm">
                    ← Return to Public Welcome Page
                </a>
            </div>
        </div>

        <div class="bg-gray-50 px-6 py-3 text-center text-xs text-gray-500">
            Powered by Health Promotion Gweru
        </div>
    </div>
</body>
</html>
